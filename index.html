<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Athlete Workout Tracker</title>
  
  <style>
    * {
      box-sizing: border-box; margin: 0; padding: 0;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }

    body, html {
      width: 100%; height: 100%;
      background-color: #000000; color: #FF6600;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .screen {
      display: none; width: 100vw; height: 100vh;
      position: absolute; top: 0; left: 0; background-color: #000000;
    }

    .active { display: flex; }

    /* --- SPLASH & SCHEDULE --- */
    #splash-screen {
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 20px; overflow: hidden;
    }
    #splash-screen h1 { font-size: 3rem; font-weight: 900; letter-spacing: 2px; line-height: 1.1; text-transform: uppercase; }
    .splash-subtitle { font-size: 1rem; font-weight: 700; color: #888; letter-spacing: 3px; margin-top: 10px; text-transform: uppercase; }

    #schedule-screen {
      flex-direction: column; align-items: center; justify-content: center;
      gap: 30px; padding: 40px 20px; overflow: hidden;
    }
    .screen-title { font-size: 2.2rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; }

    .days-container { display: flex; flex-direction: column; width: 100%; max-width: 320px; gap: 12px; }
    .day-btn {
      background: transparent; color: #FF6600; border: 2px solid #FF6600;
      padding: 16px; font-size: 1.25rem; font-weight: 700; border-radius: 10px;
      text-transform: uppercase; cursor: pointer; text-align: center;
    }
    .day-btn:active { background: #FF6600; color: #000000; }

    /* --- ROUTINE SCREEN --- */
    #routine-screen {
      flex-direction: column; height: 100vh; overflow-y: auto; padding: 20px;
    }
    .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .back-btn { background: transparent; border: 1px solid #FF6600; color: #FF6600; padding: 8px 16px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; cursor: pointer; }
    .routine-header { text-align: center; border-bottom: 2px solid #FF6600; padding-bottom: 15px; margin-bottom: 20px; }
    .day-subtitle { font-size: 1.2rem; font-weight: 600; color: #FFF; margin-top: 5px; text-transform: uppercase; }

    .supersets-list { display: flex; flex-direction: column; gap: 30px; padding-bottom: 40px; }
    
    /* --- SUPERSET STYLING --- */
    .superset-section { display: flex; flex-direction: column; gap: 10px; }
    .superset-title-block { border-bottom: 1px solid rgba(255, 102, 0, 0.5); padding-bottom: 8px; margin-bottom: 5px; }
    .superset-header { font-size: 1.3rem; font-weight: 900; color: #FF6600; letter-spacing: 1px; text-transform: uppercase; }
    .superset-details { font-size: 0.85rem; color: #AAA; font-style: italic; margin-top: 4px; line-height: 1.3; }

    .set-block {
      background-color: #0A0A0A; border: 1px solid #333; border-radius: 10px; padding: 12px;
      display: flex; flex-direction: column; gap: 12px; margin-bottom: 5px;
    }
    
    .set-label { font-size: 0.9rem; font-weight: bold; color: #FFF; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 6px; display: flex; align-items: baseline; justify-content: space-between; }

    .exercise-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .exercise-thumb { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; background: #FFF; }
    .exercise-info { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
    .exercise-name { font-size: 0.9rem; font-weight: 700; color: #FFF; line-height: 1.1; }

    .exercise-inputs { display: flex; gap: 6px; align-items: center; }

    /* Input styling */
    .exercise-inputs input {
      width: 55px; height: 40px; text-align: center; font-size: 1rem; font-weight: bold;
      background: #111; color: #FF6600; border: 1px solid #555; border-radius: 6px; outline: none;
    }
    .exercise-inputs input::placeholder { color: #555; font-size: 0.8rem; font-weight: normal; }
    .exercise-inputs input:focus { border-color: #FF6600; background: #000; }
    
    input[type="number"]::-webkit-inner-spin-button, 
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    .input-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .input-label { font-size: 0.6rem; color: #888; text-transform: uppercase; font-weight: bold; }

    /* Burnout & Set Specifics */
    .burnout-details { font-size: 0.75rem; font-weight: normal; color: #AAA; text-transform: none; margin-left: 6px; letter-spacing: normal; text-align: right; }
    .completion-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .yes-no-btns { display: flex; gap: 6px; }
    
    .yn-btn {
      background: #111; color: #FFF; border: 1px solid #555;
      padding: 8px 16px; border-radius: 6px; font-weight: bold;
      font-size: 0.9rem; cursor: pointer; transition: all 0.2s ease;
    }
    .yn-btn.yes-selected { background: #FF0000; border-color: #FF0000; }
    .yn-btn.no-selected { background: #333; border-color: #333; color: #888; }
    
    .raise-weight-note {
      display: none; color: #FF0000; font-size: 0.8rem; font-weight: 900; 
      text-align: right; margin-top: 4px; letter-spacing: 0.5px;
    }

    .rest-btn {
      background: transparent; color: #FF6600; border: 1.5px solid #FF6600;
      padding: 10px; font-weight: 800; border-radius: 8px; text-transform: uppercase; width: 100%;
      margin-top: 5px; cursor: pointer; transition: all 0.2s ease;
    }
    .rest-btn.active-timer { background: #FF6600; color: #000; border-color: #FF6600; }

    /* Complete Button */
    .complete-btn-container {
      display: flex; justify-content: center; padding: 20px 0; margin-top: 10px; border-top: 2px solid #333;
    }
    .complete-btn {
      background: #FF6600; color: #000; border: none; padding: 18px 40px; font-size: 1.4rem;
      font-weight: 900; border-radius: 12px; text-transform: uppercase; cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4);
    }
    .complete-btn:active { background: #E65C00; transform: translateY(2px); }

  </style>
</head>

        let html = '';

                <div class="superset-details">${superset.details}</div>
              </div>
          `;

          let restBtnText = "REST 1 MINUTE";

              // Unique key for input persistence
              const inputKeyBase = `${day}_s${sIndex}_set${i}_ex${eIndex}_`;
              const savedW = savedInputs[inputKeyBase + 'w'] !== undefined ? savedInputs[inputKeyBase + 'w'] : '';
              const savedR = savedInputs[inputKeyBase + 'r'] !== undefined ? savedInputs[inputKeyBase + 'r'] : '';
              
              html += `
                <div class="exercise-row">
                  <img src="${ex.img}" alt="${ex.name}" class="exercise-thumb" />
                  <div class="exercise-info">
                    <div class="exercise-name" data-ex-name="${ex.name}">${ex.name}</div>
                  </div>
                  <div class="exercise-inputs">
                    <div class="input-group">
                      <span class="input-label">Weight</span>
                      <input type="number" class="weight-input" data-key="${inputKeyBase}w" inputmode="decimal" value="${savedW}" placeholder="${exPr.weight}" oninput="saveCurrentInputs()">
                    </div>
                    <div class="input-group">
                      <span class="input-label">Reps</span>
                      <input type="number" class="rep-input" data-key="${inputKeyBase}r" inputmode="numeric" value="${savedR}" placeholder="${exPr.reps}" oninput="saveCurrentInputs()">
                    </div>
                  </div>
                </div>
              `;
            });

            html += `<button class="rest-btn" onclick="startRestTimer(this, ${restSeconds})">${restBtnText}</button>`;
            html += `</div>`; 
          }

          // Burnout Set
          if (superset.hasBurnout) {
            const targetBurnoutEx = superset.exercises[superset.burnoutIndex]; 
            
            html += `
              <div class="set-block">
                <div class="set-label">BURNOUT SET <span class="burnout-details">${superset.burnoutText}</span></div>
                
                <div class="exercise-row">
                  <img src="${targetBurnoutEx.img}" alt="${targetBurnoutEx.name}" class="exercise-thumb" />
                  <div class="exercise-info">
                    <div class="exercise-name">${targetBurnoutEx.name}</div>
                  </div>
                  
                  <div class="completion-group">
                    <span class="input-label">COMPLETED?</span>
                    <div class="yes-no-btns">
                      <button class="yn-btn yes-btn" onclick="markBurnout(this, 'yes')">YES</button>
                      <button class="yn-btn no-btn" onclick="markBurnout(this, 'no')">NO</button>
                    </div>
                  </div>
                </div>
                
                <div class="raise-weight-note">⚠️ RAISE WEIGHT NEXT WEEK</div>
                <button class="rest-btn" onclick="startRestTimer(this, ${restSeconds})">${restBtnText}</button>
              </div>
            `;
          }

          html += `</div>`; // Close superset-section
        });

        html += `
          <div class="complete-btn-container">
            <button class="complete-btn" onclick="completeWorkout()">COMPLETE</button>
          </div>
        `;

        container.innerHTML = html;
      } else {
        container.innerHTML = `<div style="text-align:center; margin-top: 50px; color: #555;">No exercises programmed for ${day} yet.</div>`;
      }
    }

    // 5. Save Inputs Real-time
    function saveCurrentInputs() {
      const savedInputs = {};
      document.querySelectorAll('.weight-input, .rep-input').forEach(input => {
        const key = input.getAttribute('data-key');
        if (key && input.value !== '') {
          savedInputs[key] = input.value;
        }
      });
      localStorage.setItem('current_workout_inputs', JSON.stringify(savedInputs));
    }

    // 6. Burnout Interactive Logic
    function markBurnout(btn, answer) {
      const parentBlock = btn.closest('.set-block');
      const yesBtn = parentBlock.querySelector('.yes-btn');
      const noBtn = parentBlock.querySelector('.no-btn');
      const note = parentBlock.querySelector('.raise-weight-note');

      yesBtn.classList.remove('yes-selected');
      noBtn.classList.remove('no-selected');
      note.style.display = 'none';

      if (answer === 'yes') {
        yesBtn.classList.add('yes-selected');
        note.style.display = 'block';
      } else {
        noBtn.classList.add('no-selected');
      }
    }

    // 7. Save PRs Logic
    function completeWorkout() {
      const prData = JSON.parse(localStorage.getItem('athlete_prs') || '{}');
      const allRows = document.querySelectorAll('.exercise-row');

      allRows.forEach(row => {
        const nameEl = row.querySelector('.exercise-name');
        const wInput = row.querySelector('.weight-input');
        const rInput = row.querySelector('.rep-input');

        if (nameEl && wInput && rInput) {
          const name = nameEl.getAttribute('data-ex-name');
          const weight = parseFloat(wInput.value) || 0;
          const reps = parseInt(rInput.value) || 0;

          if (weight > 0 || reps > 0) {
            if (!prData[name]) {
              prData[name] = { weight: 0, reps: 0 };
            }
            
            if (weight > prData[name].weight || (weight === prData[name].weight && reps > prData[name].reps)) {
              prData[name] = { weight: weight, reps: reps };
            }
          }
        }
      });

      localStorage.setItem('athlete_prs', JSON.stringify(prData));
      alert("Workout Completed! Great job. Your top reps & weights have been saved for next week.");
      goBackToSchedule();
    }

    // 8. Timer Logic
    function startRestTimer(btnElement, totalSeconds) {
      if (btnElement.dataset.running === "true") return;
      
      btnElement.dataset.running = "true";
      btnElement.classList.add("active-timer");
      
      let timeLeft = totalSeconds || 60;
      btnElement.innerText = `RESTING: ${timeLeft}s`;

      const timerInterval = setInterval(() => {
        timeLeft--;
        
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          btnElement.innerText = "REST COMPLETE";
          btnElement.classList.remove("active-timer");
          btnElement.style.borderColor = "#333";
          btnElement.style.color = "#888";
        } else {
          btnElement.innerText = `RESTING: ${timeLeft}s`;
        }
      }, 1000);
    }
  </script>
</body>
</html>
