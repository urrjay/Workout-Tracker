<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FF6600" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Athlete Workout Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  
  <style>
    * {
      box-sizing: border-box; margin: 0; padding: 0;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }

    body, html {
      width: 100%; height: 100%;
      background: #ffffff;
      color: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .screen {
      display: none; width: 100vw; height: 100vh;
      position: absolute; top: 0; left: 0;
      background: #ffffff;
      flex-direction: column;
    }

    .active { display: flex !important; }

    /* --- SPLASH SCREEN --- */
    #splash-screen {
      align-items: center; justify-content: center;
      text-align: center; padding: 20px; overflow: hidden;
      background: linear-gradient(135deg, #FF6600, #FFB84D);
    }
    #splash-screen h1 { 
      font-size: 3rem; font-weight: 900; letter-spacing: 2px; line-height: 1.1; 
      text-transform: uppercase; color: #000;
    }
    .splash-subtitle { 
      font-size: 1rem; font-weight: 700; color: #000;
      letter-spacing: 3px; margin-top: 10px; text-transform: uppercase; 
    }

    /* --- HEADER/TOP SECTION --- */
    .screen-header {
      background: #000; color: #fff; padding: 20px 15px; width: 100%;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }

    .screen-header-title {
      font-size: 1.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
    }

    .header-nav {
      display: flex; gap: 10px; align-items: center;
    }

    .header-btn {
      background: #FF6600; color: #000; border: none; width: 40px; height: 40px;
      border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem;
    }
    .header-btn:active { background: #FFB84D; }

    /* --- CONTENT AREA WITH ROUNDED SEPARATION --- */
    .screen-content {
      background: #ffffff; flex: 1; overflow-y: auto; padding: 0;
      display: flex; flex-direction: column; align-items: center;
      border-radius: 24px 24px 0 0;
      margin-top: -12px;
      padding-top: 20px;
      padding-left: 15px;
      padding-right: 15px;
      padding-bottom: 20px;
    }

    /* --- SCHEDULE SCREEN --- */
    #schedule-screen .screen-content {
      gap: 0;
    }

    .days-container { 
      display: flex; flex-direction: column; width: 100%; max-width: 380px; gap: 12px;
    }
    
    .day-btn-wrapper {
      display: flex; flex-direction: column; gap: 6px;
    }

    .day-btn {
      background: #000; color: #fff; border: none; padding: 16px; 
      font-size: 1.1rem; font-weight: 700; border-radius: 12px; 
      text-transform: uppercase; cursor: pointer; text-align: left; 
      transition: all 0.2s;
    }
    .day-btn:active { 
      background: #333; transform: scale(0.98);
    }

    .day-muscles {
      font-size: 0.65rem; color: #666; text-transform: uppercase; 
      letter-spacing: 0.5px; padding-left: 16px; font-weight: 500;
    }

    .measurements-btn {
      background: #000; color: #fff; border: none; padding: 14px; 
      font-size: 1rem; font-weight: 700; border-radius: 12px; 
      text-transform: uppercase; cursor: pointer; text-align: center; 
      transition: all 0.2s; width: 100%; max-width: 380px; margin-top: 8px;
    }
    .measurements-btn:active { 
      background: #333; transform: scale(0.98);
    }

    .admin-toggle {
      position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px;
      background: #FF6600; color: #000; border: none; 
      border-radius: 50%; font-size: 1.2rem; cursor: pointer; 
      box-shadow: 0 4px 12px rgba(255, 102, 0, 0.3); font-weight: bold; z-index: 9999;
      transition: all 0.3s;
    }
    .admin-toggle:active { transform: scale(0.95); }

    /* --- ROUTINE SCREEN --- */
    .routine-header-section {
      text-align: center; padding: 15px; width: 100%;
    }

    .routine-split-title { font-size: 0.95rem; font-weight: 600; color: #666; text-transform: uppercase; }

    .supersets-list { 
      display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 380px;
      padding-bottom: 40px;
    }
    
    /* --- SUPERSET STYLING --- */
    .superset-section { display: flex; flex-direction: column; gap: 12px; }
    
    .superset-title-block { 
      background: #000; color: #fff; padding: 12px; 
      border-radius: 12px; display: flex; flex-direction: column; gap: 4px;
    }
    .superset-header { 
      font-size: 1.1rem; font-weight: 900; color: #fff; text-transform: uppercase;
    }
    .superset-muscles {
      font-size: 0.65rem; color: #FF9800; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px;
    }
    .superset-details { font-size: 0.75rem; color: #aaa; font-style: italic; }

    .set-block {
      background: #000; color: #fff; border-radius: 12px; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    
    .set-label { 
      font-size: 0.85rem; font-weight: bold; color: #fff; text-transform: uppercase; 
      display: flex; align-items: baseline; justify-content: space-between; 
    }

    .exercise-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .exercise-thumb { 
      width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #FF6600;
    }
    .exercise-info { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
    .exercise-name { font-size: 0.8rem; font-weight: 700; color: #fff; line-height: 1.1; }

    .exercise-inputs { display: flex; gap: 4px; align-items: center; }

    /* Input styling */
    .exercise-inputs input {
      width: 50px; height: 36px; text-align: center; font-size: 0.9rem; font-weight: bold;
      background: #1a1a1a; color: #FF6600; border: 1px solid #333; border-radius: 6px; outline: none;
    }
    .exercise-inputs input::placeholder { color: #666; font-size: 0.75rem; }
    .exercise-inputs input:focus { border-color: #FF6600; }
    
    input[type="number"]::-webkit-inner-spin-button, 
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    .input-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .input-label { font-size: 0.6rem; color: #999; text-transform: uppercase; font-weight: bold; }

    .burnout-details { font-size: 0.7rem; font-weight: normal; color: #FF9800; }
    .completion-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .yes-no-btns { display: flex; gap: 5px; }
    
    .yn-btn {
      background: #333; color: #fff; border: 1px solid #555;
      padding: 6px 12px; border-radius: 6px; font-weight: bold;
      font-size: 0.8rem; cursor: pointer; transition: all 0.2s ease;
    }
    .yn-btn.yes-selected { 
      background: #FF6600; border-color: #FF6600; color: #000; 
    }
    .yn-btn.no-selected { 
      background: #666; border-color: #666; color: #fff; 
    }
    
    .raise-weight-note {
      display: none; color: #FF9800; font-size: 0.75rem; font-weight: 800; 
      text-align: right; margin-top: 3px;
    }

    .rest-btn {
      background: #333; color: #fff; border: 1.5px solid #555;
      padding: 8px; font-weight: 700; border-radius: 8px; text-transform: uppercase; width: 100%;
      font-size: 0.75rem; cursor: pointer; transition: all 0.3s ease;
    }
    .rest-btn:active { 
      background: #FF6600; color: #000; border-color: #FF6600; 
    }
    .rest-btn.active-timer { 
      background: #FF6600; color: #000; border-color: #FF6600; 
    }

    /* Complete Button */
    .complete-btn-container {
      display: flex; justify-content: center; padding: 15px 0; margin-top: 10px; width: 100%;
    }
    .complete-btn {
      background: #000; color: #fff; border: none; padding: 15px 35px; font-size: 1.1rem;
      font-weight: 900; border-radius: 12px; text-transform: uppercase; cursor: pointer;
    }
    .complete-btn:active { 
      background: #333;
    }

    /* --- MEASUREMENTS SCREEN --- */
    .measurements-form {
      background: #000; color: #fff; border-radius: 12px; padding: 15px; 
      width: 100%; max-width: 380px; margin: 10px 0;
    }

    .form-group {
      margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px;
    }

    .form-label {
      font-size: 0.9rem; font-weight: 600; color: #FF6600; text-transform: uppercase;
    }

    .form-input {
      background: #1a1a1a; color: #FF6600; border: 1px solid #333; 
      padding: 10px; border-radius: 8px; font-size: 0.95rem; font-weight: bold;
    }
    .form-input:focus { border-color: #FF6600; outline: none; }

    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }

    .chart-container {
      background: #000; color: #fff; border-radius: 12px; padding: 15px;
      margin: 15px 0; position: relative; height: 250px; width: 100%; max-width: 380px;
    }

    .chart-title {
      font-size: 0.9rem; font-weight: 700; color: #FF6600; text-transform: uppercase; margin-bottom: 10px;
    }

    .measurements-buttons {
      display: flex; gap: 10px; width: 100%; max-width: 380px;
    }

    .measurements-buttons button {
      flex: 1; background: #000; color: #fff;
      border: none; padding: 12px; border-radius: 10px; font-weight: 700;
      font-size: 0.9rem; text-transform: uppercase; cursor: pointer;
    }
    .measurements-buttons button:active { background: #333; }

    /* --- ADMIN PANEL --- */
    .admin-content {
      display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 380px;
    }

    .admin-tabs { 
      display: flex; gap: 8px; overflow-x: auto; width: 100%;
      background: #f5f5f5; padding: 8px; border-radius: 10px;
    }
    .admin-tab-btn {
      background: transparent; color: #000; border: none; padding: 8px 12px; 
      font-weight: 600; cursor: pointer; border-radius: 8px; font-size: 0.85rem;
      white-space: nowrap; transition: all 0.2s;
    }
    .admin-tab-btn.active { background: #000; color: #fff; }

    .admin-panel { display: none; }
    .admin-panel.active { display: flex; flex-direction: column; gap: 15px; }

    .selector-group { display: flex; flex-direction: column; gap: 8px; }
    .selector-group label { font-weight: 600; color: #000; font-size: 0.9rem; text-transform: uppercase; }
    .selector-group select {
      background: #000; color: #fff; border: none; padding: 10px; 
      border-radius: 8px; font-size: 0.9rem; font-weight: bold;
    }

    .superset-config { 
      background: #f5f5f5; border: 2px solid #000; padding: 12px; 
      border-radius: 12px;
    }
    .config-input {
      background: #000; color: #fff; border: 1px solid #333; 
      padding: 8px; border-radius: 6px; width: 100%; margin-bottom: 8px; 
      font-size: 0.9rem; font-weight: bold;
    }
    .config-input::placeholder { color: #666; }

    .selected-exercises { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .exercise-tag {
      background: #FF6600; color: #000; padding: 8px 12px; 
      border-radius: 8px; display: flex; justify-content: space-between; align-items: center; 
      font-weight: 600; font-size: 0.85rem;
    }
    .exercise-tag button { background: transparent; border: none; color: #000; cursor: pointer; font-weight: bold; }

    .admin-btn {
      background: #000; color: #fff; border: none; 
      padding: 12px; border-radius: 8px; font-weight: 700; font-size: 0.9rem; 
      text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .admin-btn:active { background: #333; }

    .admin-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
    .admin-buttons button { flex: 1; min-width: 120px; }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash-screen" class="screen active">
    <h1>WORKOUT<br />TRACKER</h1>
    <div class="splash-subtitle">MUSCLES BY RJ</div>
  </div>
  
  <!-- SCHEDULE SCREEN -->
  <div id="schedule-screen" class="screen">
    <div class="screen-header">
      <div class="screen-header-title">SCHEDULE</div>
    </div>
    <div class="screen-content">
      <div class="days-container">
        <div class="day-btn-wrapper">
          <button class="day-btn" onclick="openDay('Monday')">MONDAY</button>
          <div class="day-muscles" id="muscles-Monday"></div>
        </div>
        <div class="day-btn-wrapper">
          <button class="day-btn" onclick="openDay('Tuesday')">TUESDAY</button>
          <div class="day-muscles" id="muscles-Tuesday"></div>
        </div>
        <div class="day-btn-wrapper">
          <button class="day-btn" onclick="openDay('Wednesday')">WEDNESDAY</button>
          <div class="day-muscles" id="muscles-Wednesday"></div>
        </div>
        <div class="day-btn-wrapper">
          <button class="day-btn" onclick="openDay('Thursday')">THURSDAY</button>
          <div class="day-muscles" id="muscles-Thursday"></div>
        </div>
        <div class="day-btn-wrapper">
          <button class="day-btn" onclick="openDay('Friday')">FRIDAY</button>
          <div class="day-muscles" id="muscles-Friday"></div>
        </div>
      </div>
      <button class="measurements-btn" onclick="openMeasurements()">MEASUREMENTS & PROGRESS</button>
    </div>
  </div>

  <!-- ROUTINE SCREEN -->
  <div id="routine-screen" class="screen">
    <div class="screen-header">
      <button class="header-btn" onclick="goBackToSchedule()">←</button>
      <div id="routine-day-title" class="screen-header-title"></div>
      <div style="width: 40px;"></div>
    </div>
    <div class="screen-content">
      <div class="routine-header-section">
        <div id="routine-split-title" class="routine-split-title"></div>
      </div>
      <div id="supersets-list" class="supersets-list"></div>
    </div>
  </div>

  <!-- MEASUREMENTS SCREEN -->
  <div id="measurements-screen" class="screen">
    <div class="screen-header">
      <button class="header-btn" onclick="goBackToSchedule()">←</button>
      <div class="screen-header-title">MEASUREMENTS</div>
      <div style="width: 40px;"></div>
    </div>
    <div class="screen-content">
      <div class="measurements-form">
        <h3 style="color: #FF6600; margin-bottom: 12px; text-transform: uppercase;">CURRENT MONTH</h3>
        
        <div class="form-group">
          <label class="form-label">Body Weight (lbs)</label>
          <input type="number" class="form-input" id="weight-input" placeholder="Enter weight" step="0.1">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Bicep (in)</label>
            <input type="number" class="form-input" id="bicep-input" placeholder="L + R" step="0.1">
          </div>
          <div class="form-group">
            <label class="form-label">Chest (in)</label>
            <input type="number" class="form-input" id="chest-input" placeholder="measurement" step="0.1">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Waist (in)</label>
            <input type="number" class="form-input" id="waist-input" placeholder="optional" step="0.1">
          </div>
          <div class="form-group">
            <label class="form-label">Thigh (in)</label>
            <input type="number" class="form-input" id="thigh-input" placeholder="optional" step="0.1">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">3-Point Fat Caliper (%)</label>
          <input type="number" class="form-input" id="bodyfat-input" placeholder="optional" step="0.1">
        </div>

        <div class="measurements-buttons">
          <button onclick="saveMeasurement()">SAVE</button>
        </div>
      </div>

      <div id="charts-container"></div>
    </div>
  </div>

  <!-- ADMIN SCREEN -->
  <div id="admin-screen" class="screen">
    <div class="screen-header">
      <div class="screen-header-title">ADMIN</div>
      <button class="header-btn" onclick="closeAdmin()">✕</button>
    </div>
    <div class="screen-content">
      <div class="admin-content">
        <div class="admin-tabs">
          <button class="admin-tab-btn active" onclick="switchAdminTab('build')">Build Routine</button>
          <button class="admin-tab-btn" onclick="switchAdminTab('manage')">Manage Data</button>
        </div>

        <!-- BUILD ROUTINE TAB -->
        <div id="admin-build" class="admin-panel active">
          <div class="selector-group">
            <label>Select Day to Edit:</label>
            <select id="admin-day-select" onchange="loadDayForEdit()">
              <option value="">-- Choose Day --</option>
              <option value="Monday">Monday</option>
              <option value="Tuesday">Tuesday</option>
              <option value="Wednesday">Wednesday</option>
              <option value="Thursday">Thursday</option>
              <option value="Friday">Friday</option>
            </select>
          </div>

          <div id="supersets-config-container"></div>

          <div class="admin-buttons">
            <button class="admin-btn" onclick="addNewSuperset()">+ Add Superset</button>
            <button class="admin-btn" onclick="saveDayRoutine()">SAVE DAY</button>
          </div>
        </div>

        <!-- MANAGE DATA TAB -->
        <div id="admin-manage" class="admin-panel">
          <h3 style="color: #000; font-size: 1rem; text-transform: uppercase; margin-top: 10px;">Backup & Import</h3>
          <button class="admin-btn" onclick="exportRoutines()">Export Routines</button>
          <button class="admin-btn" onclick="importRoutines()">Import Routines</button>
          <button class="admin-btn" onclick="clearAllData()">Clear All Data</button>

          <h3 style="color: #000; font-size: 1rem; text-transform: uppercase; margin-top: 15px;">Athlete PRs</h3>
          <button class="admin-btn" onclick="exportPRs()">Export PRs</button>
          <button class="admin-btn" onclick="clearPRs()">Clear All PRs</button>

          <h3 style="color: #000; font-size: 1rem; text-transform: uppercase; margin-top: 15px;">Measurements</h3>
          <button class="admin-btn" onclick="exportMeasurements()">Export Measurements</button>
          <button class="admin-btn" onclick="clearMeasurements()">Clear Measurements</button>

          <h3 style="color: #000; font-size: 1rem; text-transform: uppercase; margin-top: 15px;">Current Week</h3>
          <button class="admin-btn" onclick="exportCurrentInputs()">Export Inputs</button>
          <button class="admin-btn" onclick="clearCurrentInputs()">Clear Inputs</button>

          <input type="file" id="import-file" style="display: none;" accept=".json" />
        </div>
      </div>
    </div>
  </div>

  <button class="admin-toggle" onclick="toggleAdmin()">⚙️</button>

  <script>

    (function checkSaturdayReset() {
      const now = new Date();
      const currentDayOfWeek = now.getDay();
      const currentDateString = now.toDateString();
      const lastResetDate = localStorage.getItem('last_saturday_reset');

      if (currentDayOfWeek === 6 && lastResetDate !== currentDateString) {
        localStorage.removeItem('current_workout_inputs');
        localStorage.setItem('last_saturday_reset', currentDateString);
      }
    })();

    }

    // ========== GET MUSCLE GROUPS FROM EXERCISES ==========
    function getMusclesFromExercises(exercises) {
      const muscles = new Set();
      exercises.forEach(ex => {
        EXERCISE_DATABASE[Object.keys(EXERCISE_DATABASE)[0]];
        Object.values(EXERCISE_DATABASE).forEach(muscleGroup => {
          Object.values(muscleGroup).forEach(equipmentExercises => {
            const found = equipmentExercises.find(e => e.name === ex.name);
            if (found && found.muscles) {
              found.muscles.forEach(m => muscles.add(m));
            }
          });
        });
      });
      return Array.from(muscles).join(", ");
    }

    // ========== UPDATE DISPLAY WITH MUSCLE GROUPS ==========
    function updateScheduleDisplay() {
      const routines = getRoutines();
      ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'].forEach(day => {
        const dayRoutine = routines[day];
        let muscles = '';
        if (dayRoutine && dayRoutine.supersets) {
          const muscleSet = new Set();
          dayRoutine.supersets.forEach(ss => {
            if (ss.muscles) {
              ss.muscles.split(", ").forEach(m => muscleSet.add(m));
            }
          });
          muscles = Array.from(muscleSet).join(" • ");
        }
        document.getElementById(`muscles-${day}`).innerText = muscles;
      });
    }

    // ========== MEASUREMENTS ==========
    function saveMeasurement() {
      const measurements = getMeasurements();
      const today = new Date().toISOString().split('T')[0];

      const newEntry = {
        date: today,
        weight: parseFloat(document.getElementById('weight-input').value) || null,
        bicep: parseFloat(document.getElementById('bicep-input').value) || null,
        chest: parseFloat(document.getElementById('chest-input').value) || null,
        waist: parseFloat(document.getElementById('waist-input').value) || null,
        thigh: parseFloat(document.getElementById('thigh-input').value) || null,
        bodyfat: parseFloat(document.getElementById('bodyfat-input').value) || null,
      };

      const index = measurements.findIndex(m => m.date === today);
      if (index > -1) {
        measurements[index] = newEntry;
      } else {
        measurements.push(newEntry);
      }

      saveMeasurementsData(measurements);
      alert('Measurement saved!');
      loadMeasurementsUI();
    }

    function loadMeasurementsUI() {
      const measurements = getMeasurements();
      
      document.getElementById('weight-input').value = '';
      document.getElementById('bicep-input').value = '';
      document.getElementById('chest-input').value = '';
      document.getElementById('waist-input').value = '';
      document.getElementById('thigh-input').value = '';
      document.getElementById('bodyfat-input').value = '';

      const today = new Date().toISOString().split('T')[0];
      const today_data = measurements.find(m => m.date === today);
      if (today_data) {
        if (today_data.weight) document.getElementById('weight-input').value = today_data.weight;
        if (today_data.bicep) document.getElementById('bicep-input').value = today_data.bicep;
        if (today_data.chest) document.getElementById('chest-input').value = today_data.chest;
        if (today_data.waist) document.getElementById('waist-input').value = today_data.waist;
        if (today_data.thigh) document.getElementById('thigh-input').value = today_data.thigh;
        if (today_data.bodyfat) document.getElementById('bodyfat-input').value = today_data.bodyfat;
      }

      const chartsContainer = document.getElementById('charts-container');
      chartsContainer.innerHTML = '';

      if (measurements.length === 0) {
        chartsContainer.innerHTML = '<div style="color: #666; text-align: center; padding: 20px;">No measurements yet. Add one to see progress!</div>';
        return;
      }

      if (measurements.some(m => m.weight)) {
        chartsContainer.innerHTML += createChart('Weight (lbs)', measurements, 'weight');
      }
      if (measurements.some(m => m.bicep)) {
        chartsContainer.innerHTML += createChart('Bicep (in)', measurements, 'bicep');
      }
      if (measurements.some(m => m.chest)) {
        chartsContainer.innerHTML += createChart('Chest (in)', measurements, 'chest');
      }
      if (measurements.some(m => m.waist)) {
        chartsContainer.innerHTML += createChart('Waist (in)', measurements, 'waist');
      }
      if (measurements.some(m => m.thigh)) {
        chartsContainer.innerHTML += createChart('Thigh (in)', measurements, 'thigh');
      }
      if (measurements.some(m => m.bodyfat)) {
        chartsContainer.innerHTML += createChart('Body Fat (%)', measurements, 'bodyfat');
      }

      setTimeout(() => {
        const canvases = chartsContainer.querySelectorAll('canvas');
        canvases.forEach((canvas) => {
          if (canvas && !canvas.chart) {
            initChart(canvas);
          }
        });
      }, 100);
    }

    function createChart(title, measurements, field) {
      return `<div class="chart-container"><div class="chart-title">${title}</div><canvas id="chart-${field}"></canvas></div>`;
    }

    function initChart(canvas) {
      const field = canvas.id.replace('chart-', '');
      const measurements = getMeasurements();
      const labels = measurements.map(m => new Date(m.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
      const data = measurements.map(m => m[field]);

      const ctx = canvas.getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: field,
            data: data,
            borderColor: '#FF6600',
            backgroundColor: 'rgba(255, 102, 0, 0.1)',
            borderWidth: 2,
            fill: true,
            pointRadius: 4,
            pointBackgroundColor: '#FF6600',
            pointBorderColor: '#000',
            pointBorderWidth: 2,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: false,
              grid: { color: 'rgba(255, 102, 0, 0.1)' },
              ticks: { color: '#FF6600' }
            },
            x: {
              grid: { color: 'rgba(255, 102, 0, 0.05)' },
              ticks: { color: '#FF6600' }
            }
          }
        }
      });
      canvas.chart = true;
    }

    // ========== RENDER ROUTINE ==========
    function renderRoutine(day) {
      const container = document.getElementById('supersets-list');
      container.innerHTML = '';

      const routines = getRoutines();
      const dayRoutine = routines[day];
      const prData = JSON.parse(localStorage.getItem('athlete_prs') || '{}');
      const savedInputs = JSON.parse(localStorage.getItem('current_workout_inputs') || '{}');

      if (!dayRoutine || !dayRoutine.supersets) {
        container.innerHTML = `<div style="text-align:center; margin-top: 30px; color: #666;">No routine configured for ${day} yet.</div>`;
        return;
      }

      let html = '';

      dayRoutine.supersets.forEach((superset, sIndex) => {
        html += `
          <div class="superset-section">
            <div class="superset-title-block">
              <div class="superset-header">${superset.title}</div>
              ${superset.muscles ? `<div class="superset-muscles">${superset.muscles}</div>` : ''}
              <div class="superset-details">${superset.details}</div>
            </div>
        `;

        const restSeconds = superset.restTime || 60;
        let restBtnText = "REST 60s";
        if (restSeconds === 30) restBtnText = "REST 30s";
        if (restSeconds === 90) restBtnText = "REST 90s";

        for (let i = 1; i <= superset.sets; i++) {
          const specificSetNote = superset.setSpecifics && superset.setSpecifics[i-1] ? `<span class="burnout-details">${superset.setSpecifics[i-1]}</span>` : '';

          html += `<div class="set-block">
                    <div class="set-label">
                      <span>SET ${i}</span>
                      ${specificSetNote}
                    </div>`;

          superset.exercises.forEach((ex, eIndex) => {
            const exPr = prData[ex.name] || { weight: 0, reps: 0 };
            const inputKeyBase = `${day}_s${sIndex}_set${i}_ex${eIndex}_`;
            const savedW = savedInputs[inputKeyBase + 'w'] !== undefined ? savedInputs[inputKeyBase + 'w'] : '';
            const savedR = savedInputs[inputKeyBase + 'r'] !== undefined ? savedInputs[inputKeyBase + 'r'] : '';

            html += `
              <div class="exercise-row">
                <img src="${ex.url}" alt="${ex.name}" class="exercise-thumb" onerror="this.src='https://via.placeholder.com/50/FF6600/FF6600?text=GIF'" />
                <div class="exercise-info">
                  <div class="exercise-name" data-ex-name="${ex.name}">${ex.name}</div>
                </div>
                <div class="exercise-inputs">
                  <div class="input-group">
                    <span class="input-label">Lbs</span>
                    <input type="number" class="weight-input" data-key="${inputKeyBase}w" inputmode="decimal" value="${savedW}" placeholder="${exPr.weight || '0'}" oninput="saveCurrentInputs()">
                  </div>
                  <div class="input-group">
                    <span class="input-label">Reps</span>
                    <input type="number" class="rep-input" data-key="${inputKeyBase}r" inputmode="numeric" value="${savedR}" placeholder="${exPr.reps || '0'}" oninput="saveCurrentInputs()">
                  </div>
                </div>
              </div>
            `;
          });

          html += `<button class="rest-btn" onclick="startRestTimer(this, ${restSeconds})">${restBtnText}</button>`;
          html += `</div>`;
        }

        if (superset.burnout && superset.burnoutExerciseIndex !== undefined) {
          const targetEx = superset.exercises[superset.burnoutExerciseIndex];

          html += `
            <div class="set-block">
              <div class="set-label">BURNOUT <span class="burnout-details">${superset.burnoutText}</span></div>

              <div class="exercise-row">
                <img src="${targetEx.url}" alt="${targetEx.name}" class="exercise-thumb" onerror="this.src='https://via.placeholder.com/50/FF6600/FF6600?text=GIF'" />
                <div class="exercise-info">
                  <div class="exercise-name">${targetEx.name}</div>
                </div>

                <div class="completion-group">
                  <span class="input-label">DONE?</span>
                  <div class="yes-no-btns">
                    <button class="yn-btn yes-btn" onclick="markBurnout(this, 'yes')">YES</button>
                    <button class="yn-btn no-btn" onclick="markBurnout(this, 'no')">NO</button>
                  </div>
                </div>
              </div>

              <div class="raise-weight-note">RAISE WEIGHT NEXT WEEK</div>
              <button class="rest-btn" onclick="startRestTimer(this, ${restSeconds})">${restBtnText}</button>
            </div>
          `;
        }

        html += `</div>`;
      });

      html += `<div class="complete-btn-container"><button class="complete-btn" onclick="completeWorkout()">COMPLETE</button></div>`;

      container.innerHTML = html;
    }

    function saveCurrentInputs() {
      const savedInputs = {};
      document.querySelectorAll('.weight-input, .rep-input').forEach(input => {
        const key = input.getAttribute('data-key');
        if (key && input.value !== '') {
          savedInputs[key] = input.value;
        }
      });
      localStorage.setItem('current_workout_inputs', JSON.stringify(savedInputs));
    }

    function markBurnout(btn, answer) {
      const parentBlock = btn.closest('.set-block');
      const yesBtn = parentBlock.querySelector('.yes-btn');
      const noBtn = parentBlock.querySelector('.no-btn');
      const note = parentBlock.querySelector('.raise-weight-note');

      yesBtn.classList.remove('yes-selected');
      noBtn.classList.remove('no-selected');
      note.style.display = 'none';

      if (answer === 'yes') {
        yesBtn.classList.add('yes-selected');
        note.style.display = 'block';
      } else {
        noBtn.classList.add('no-selected');
      }
    }

    function completeWorkout() {
      const prData = JSON.parse(localStorage.getItem('athlete_prs') || '{}');
      const allRows = document.querySelectorAll('.exercise-row');

      allRows.forEach(row => {
        const nameEl = row.querySelector('.exercise-name');
        const wInput = row.querySelector('.weight-input');
        const rInput = row.querySelector('.rep-input');

        if (nameEl && wInput && rInput) {
          const name = nameEl.getAttribute('data-ex-name');
          const weight = parseFloat(wInput.value) || 0;
          const reps = parseInt(rInput.value) || 0;

          if (weight > 0 || reps > 0) {
            if (!prData[name]) {
              prData[name] = { weight: 0, reps: 0 };
            }

            if (weight > prData[name].weight || (weight === prData[name].weight && reps > prData[name].reps)) {
              prData[name] = { weight: weight, reps: reps };
            }
          }
        }
      });

      localStorage.setItem('athlete_prs', JSON.stringify(prData));
      alert("Workout Completed! PRs saved.");
      goBackToSchedule();
    }

    function startRestTimer(btnElement, totalSeconds) {
      if (btnElement.dataset.running === "true") return;

      btnElement.dataset.running = "true";
      btnElement.classList.add("active-timer");

      let timeLeft = totalSeconds || 60;
      btnElement.innerText = `RESTING: ${timeLeft}s`;

      const timerInterval = setInterval(() => {
        timeLeft--;

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          btnElement.innerText = "REST COMPLETE";
          btnElement.classList.remove("active-timer");
        } else {
          btnElement.innerText = `RESTING: ${timeLeft}s`;
        }
      }, 1000);
    }

    function renderSupersetConfig(superset, index) {

          <label style="color: #000; font-size: 0.85rem; font-weight: 600;">Rest Time (seconds):</label>
          <input type="number" class="config-input" value="${superset.restTime || 60}" onchange="updateSuperset(${index}, 'restTime', parseInt(this.value))">

          <label style="color: #000; font-size: 0.85rem; font-weight: 600;">Muscle Group:</label>
          <select class="config-input" onchange="updateMuscleGroup(${index}, this.value)">
            <option value="">-- Select Muscle --</option>
            <option value="Chest" ${superset.muscleGroup === 'Chest' ? 'selected' : ''}>Chest</option>
            <option value="Back" ${superset.muscleGroup === 'Back' ? 'selected' : ''}>Back</option>
            <option value="Biceps" ${superset.muscleGroup === 'Biceps' ? 'selected' : ''}>Biceps</option>
            <option value="Triceps" ${superset.muscleGroup === 'Triceps' ? 'selected' : ''}>Triceps</option>
            <option value="Legs" ${superset.muscleGroup === 'Legs' ? 'selected' : ''}>Legs</option>
            <option value="Shoulders" ${superset.muscleGroup === 'Shoulders' ? 'selected' : ''}>Shoulders</option>
            <option value="Abs" ${superset.muscleGroup === 'Abs' ? 'selected' : ''}>Abs</option>
          </select>

          <label style="color: #000; font-size: 0.85rem; font-weight: 600;">Equipment:</label>
          <select class="config-input" onchange="updateEquipment(${index}, this.value)">
            <option value="">-- Select Equipment --</option>
            ${superset.muscleGroup ? Object.keys(EXERCISE_DATABASE[superset.muscleGroup] || {}).map(eq => `<option value="${eq}" ${superset.equipment === eq ? 'selected' : ''}>${eq}</option>`).join('') : ''}
          </select>

          <label style="color: #000; font-size: 0.85rem; font-weight: 600;">Exercise:</label>
          <select class="config-input" onchange="addExerciseToSuperset(${index}, this.value)" id="exercise-select-${index}">
            <option value="">-- Select Exercise --</option>
            ${superset.muscleGroup && superset.equipment ? (EXERCISE_DATABASE[superset.muscleGroup][superset.equipment] || []).map(ex => `<option value="${ex.name}|${ex.url}">${ex.name}</option>`).join('') : ''}
          </select>

          <div class="selected-exercises">${exercisesList}</div>

          <label style="color: #000; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" ${superset.burnout ? 'checked' : ''} onchange="updateSuperset(${index}, 'burnout', this.checked)">
            Has Burnout Set
          </label>

          ${superset.burnout && superset.exercises.length > 0 ? `
            <label style="color: #000; font-size: 0.85rem; font-weight: 600;">Which exercise is the burnout?</label>
            <select class="config-input" onchange="updateSuperset(${index}, 'burnoutExerciseIndex', parseInt(this.value))">
              ${superset.exercises.map((ex, i) => `<option value="${i}" ${superset.burnoutExerciseIndex === i ? 'selected' : ''}>${ex.name}</option>`).join('')}
            </select>
            <input type="text" class="config-input" placeholder="Burnout Instructions" value="${superset.burnoutText || ''}" onchange="updateSuperset(${index}, 'burnoutText', this.value)">
          ` : ''}

          <button class="admin-btn" style="margin-top: 10px; background: #999;" onclick="removeSuperset(${index})">Remove</button>
        </div>
      `;
    }

    function updateMuscleGroup(index, muscleGroup) {
      const routines = getRoutines();
      const day = document.getElementById('admin-day-select').value;
      routines[day].supersets[index].muscleGroup = muscleGroup;
      routines[day].supersets[index].equipment = '';
      routines[day].supersets[index].exercises = [];
      saveRoutines(routines);
      loadDayForEdit();
    }

    function updateEquipment(index, equipment) {
      const routines = getRoutines();
      const day = document.getElementById('admin-day-select').value;
      routines[day].supersets[index].equipment = equipment;
      saveRoutines(routines);
      loadDayForEdit();
    }

    function addExerciseToSuperset(index, exerciseData) {
      if (!exerciseData) return;
      const [name, url] = exerciseData.split('|');
      const routines = getRoutines();
      const day = document.getElementById('admin-day-select').value;
      const superset = routines[day].supersets[index];

      if (!superset.exercises.some(ex => ex.name === name)) {
        superset.exercises.push({ name: name, url: url });
        
        // Auto-populate muscles
        superset.muscles = getMusclesFromExercises(superset.exercises);
        
        saveRoutines(routines);
        loadDayForEdit();
      }
      document.getElementById(`exercise-select-${index}`).value = '';
    }

    function removeExercise(supersetIndex, exerciseName) {
      const routines = getRoutines();
      const day = document.getElementById('admin-day-select').value;
      const superset = routines[day].supersets[supersetIndex];
      superset.exercises = superset.exercises.filter(ex => ex.name !== exerciseName);
      
      // Update muscles
      superset.muscles = getMusclesFromExercises(superset.exercises);
      
      saveRoutines(routines);
      loadDayForEdit();
    }

    function updateSuperset(index, field, value) {
      const routines = getRoutines();
      const day = document.getElementById('admin-day-select').value;
      if (!routines[day]) routines[day] = { title: '', supersets: [] };
      routines[day].supersets[index][field] = value;
      saveRoutines(routines);
      if (field === 'burnout' && !value) {
        routines[day].supersets[index].burnoutExerciseIndex = 0;
        routines[day].supersets[index].burnoutText = '';
        saveRoutines(routines);
        loadDayForEdit();
      }
    }

    function addNewSuperset() {
      const routines = getRoutines();
      const day = document.getElementById('admin-day-select').value;
      if (!day) {
        alert('Please select a day first');
        return;
      }
      if (!routines[day]) {
        routines[day] = { title: '', supersets: [] };
      }

      routines[day].supersets.push({
        title: '',
        details: '',
        sets: 3,
        restTime: 60,
        exercises: [],
        muscleGroup: '',
        equipment: '',
        muscles: '',
        burnout: false,
        burnoutExerciseIndex: 0,
        burnoutText: ''
      });

      saveRoutines(routines);
      loadDayForEdit();
    }

    function removeSuperset(index) {
      const routines = getRoutines();
      const day = document.getElementById('admin-day-select').value;
      routines[day].supersets.splice(index, 1);
      saveRoutines(routines);
      loadDayForEdit();
    }

    function saveDayRoutine() {
      const day = document.getElementById('admin-day-select').value;
      if (!day) {
        alert('Please select a day');
        return;
      }
      const routines = getRoutines();
      if (!routines[day].title) {
        routines[day].title = '';
      }
      saveRoutines(routines);
      updateScheduleDisplay();
      alert(`${day} routine saved!`);
    }

    // ========== EXPORT/IMPORT ==========
    function exportRoutines() {
      const routines = getRoutines();
      const dataStr = JSON.stringify(routines, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `routines-${new Date().toISOString().split('T')[0]}.json`;
      link.click();
    }

    function importRoutines() {
      document.getElementById('import-file').click();
    }

    document.getElementById('import-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const imported = JSON.parse(event.target.result);
          saveRoutines(imported);
          alert('Routines imported!');
          loadDayForEdit();
          updateScheduleDisplay();
        } catch (err) {
          alert('Invalid file');
        }
      };
      reader.readAsText(file);
    });

    function exportPRs() {
      const prs = JSON.parse(localStorage.getItem('athlete_prs') || '{}');
      const dataStr = JSON.stringify(prs, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `prs-${new Date().toISOString().split('T')[0]}.json`;
      link.click();
    }

    function clearPRs() {
      if (confirm('Clear all PRs?')) {
        localStorage.removeItem('athlete_prs');
        alert('PRs cleared!');
      }
    }

    function exportMeasurements() {
      const data = getMeasurements();
      const dataStr = JSON.stringify(data, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `measurements-${new Date().toISOString().split('T')[0]}.json`;
      link.click();
    }

    function clearMeasurements() {
      if (confirm('Clear all measurements?')) {
        localStorage.removeItem('athlete_measurements');
        alert('Measurements cleared!');
        loadMeasurementsUI();
      }
    }

    function exportCurrentInputs() {
      const inputs = JSON.parse(localStorage.getItem('current_workout_inputs') || '{}');
      const dataStr = JSON.stringify(inputs, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `inputs-${new Date().toISOString().split('T')[0]}.json`;
      link.click();
    }

    function clearCurrentInputs() {
      if (confirm('Clear this week\'s inputs?')) {
        localStorage.removeItem('current_workout_inputs');
        alert('Inputs cleared!');
      }
    }

    function clearAllData() {
      if (confirm('Clear ALL routines?')) {
        localStorage.removeItem('workout_routines');
        alert('All routines cleared!');
        loadDayForEdit();
        updateScheduleDisplay();
      }
    }
  </script>
</body>
</html>
