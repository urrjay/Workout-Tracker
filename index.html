<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FF6600" />
  <title>Athlete Workout Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;user-select:none}
    body,html{width:100%;height:100%;background:#fff;color:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    .screen{display:none;width:100vw;height:100vh;position:absolute;top:0;left:0;background:#fff;flex-direction:column}
    .active{display:flex!important}
    #splash-screen{align-items:center;justify-content:center;background:linear-gradient(135deg,#FF6600,#FFB84D)}
    #splash-screen h1{font-size:3rem;font-weight:900;text-transform:uppercase;color:#000}
    .splash-subtitle{font-size:1rem;font-weight:700;color:#000;margin-top:10px}
    .screen-header{background:#000;color:#fff;padding:20px 15px;display:flex;justify-content:space-between;align-items:center}
    .screen-header-title{font-size:1.6rem;font-weight:900;text-transform:uppercase;flex:1;text-align:center}
    .header-btn{background:#FF6600;color:#000;border:none;width:40px;height:40px;border-radius:8px;cursor:pointer;font-weight:bold}
    .header-btn:active{background:#FFB84D}
    .screen-content{background:#fff;flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:20px 15px;border-top:3px solid #000}
    .home-buttons{display:flex;flex-direction:column;width:100%;max-width:350px;gap:12px}
    .home-btn{background:#000;color:#fff;border:none;padding:18px;font-size:1.1rem;font-weight:700;border-radius:12px;text-transform:uppercase;cursor:pointer}
    .home-btn:active{background:#333}
    .supersets-list{display:flex;flex-direction:column;gap:15px;width:100%;max-width:380px}
    .superset-section{display:flex;flex-direction:column;gap:12px}
    .superset-title-block{background:#000;color:#fff;padding:12px;border-radius:12px}
    .superset-header{font-size:1.1rem;font-weight:900;color:#fff;text-transform:uppercase}
    .set-block{background:#000;color:#fff;border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:10px}
    .set-label{font-size:0.85rem;font-weight:bold;color:#fff;text-transform:uppercase}
    .exercise-row{display:flex;align-items:center;gap:8px}
    .exercise-thumb{width:50px;height:50px;border-radius:8px;object-fit:cover;background:#FF6600}
    .exercise-name{font-size:0.8rem;font-weight:700;color:#fff;flex-grow:1}
    .exercise-inputs{display:flex;gap:4px}
    .exercise-inputs input{width:50px;height:36px;text-align:center;font-size:0.9rem;font-weight:bold;background:#1a1a1a;color:#FF6600;border:1px solid #333;border-radius:6px}
    .input-label{font-size:0.6rem;color:#999;text-transform:uppercase;font-weight:bold}
    .rest-btn{background:#333;color:#fff;border:1.5px solid #555;padding:8px;font-weight:700;border-radius:8px;width:100%;font-size:0.75rem;cursor:pointer;text-transform:uppercase}
    .rest-btn.active-timer{background:#FF6600;color:#000;border-color:#FF6600}
    .complete-btn{background:#000;color:#fff;border:none;padding:15px 35px;font-size:1.1rem;font-weight:900;border-radius:12px;text-transform:uppercase;cursor:pointer;margin-top:20px}
    .measurements-section{background:#000;color:#fff;border-radius:12px;padding:15px;width:100%;max-width:380px;margin:10px 0}
    .section-title{font-size:0.9rem;font-weight:700;color:#fff;text-transform:uppercase;margin-bottom:12px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-label{font-size:0.8rem;font-weight:600;color:#FF6600;text-transform:uppercase}
    .form-input{background:#1a1a1a;color:#FF6600;border:1px solid #333;padding:10px;border-radius:8px;font-size:0.9rem;font-weight:bold;width:100%}
    input[type="number"]{-moz-appearance:textfield}
    input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .admin-toggle{position:fixed;bottom:30px;right:30px;width:70px;height:70px;background:#FF6600;color:#000;border:none;border-radius:50%;font-size:1.8rem;cursor:pointer;box-shadow:0 4px 16px rgba(255,102,0,0.6);font-weight:bold;z-index:99999}
    .admin-toggle:active{transform:scale(0.95)}
    .admin-panel{display:none}
    .admin-panel.active{display:flex;flex-direction:column;gap:15px}
    .admin-tabs{display:flex;gap:8px;width:100%;background:#f5f5f5;padding:8px;border-radius:10px}
    .admin-tab-btn{background:transparent;color:#000;border:none;padding:8px 12px;font-weight:600;cursor:pointer;border-radius:8px;font-size:0.85rem}
    .admin-tab-btn.active{background:#000;color:#fff}
    .selector-group{display:flex;flex-direction:column;gap:8px}
    .selector-group label{font-weight:600;color:#000;font-size:0.9rem;text-transform:uppercase}
    .selector-group select{background:#000;color:#fff;border:none;padding:10px;border-radius:8px;font-size:0.9rem;font-weight:bold;width:100%}
    .superset-config{background:#f5f5f5;border:2px solid #000;padding:12px;border-radius:12px;margin-bottom:15px}
    .config-input{background:#000;color:#fff;border:1px solid #333;padding:8px;border-radius:6px;width:100%;margin-bottom:8px;font-size:0.9rem;font-weight:bold}
    .admin-btn{background:#000;color:#fff;border:none;padding:12px;border-radius:8px;font-weight:700;font-size:0.9rem;text-transform:uppercase;cursor:pointer;width:100%;margin-bottom:8px}
    .admin-btn:active{background:#333}
    .admin-buttons{display:flex;gap:10px;flex-wrap:wrap}
    .admin-buttons button{flex:1;min-width:100px}
    .orm-result{background:#FF6600;color:#000;padding:12px;border-radius:8px;font-weight:700;text-align:center;margin-top:10px;font-size:1.1rem}
    .dashboard-stat{background:#f5f5f5;padding:15px;border-radius:12px;text-align:center;margin-bottom:10px}
    .dashboard-stat-label{font-size:0.8rem;color:#666;text-transform:uppercase;font-weight:600}
    .dashboard-stat-value{font-size:1.8rem;color:#FF6600;font-weight:900;margin-top:5px}
    .youtube-link{color:#FF6600;text-decoration:underline;cursor:pointer;font-size:0.85rem;font-weight:600;display:inline-block;margin-top:8px}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;width:100%;max-width:350px}
    .calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#f5f5f5;border-radius:8px;font-size:0.75rem;font-weight:600;border:2px solid #ddd}
    .calendar-day.completed{background:#FF6600;color:#fff;border-color:#FF6600}
    .calendar-day.today{background:#FF6600;color:#fff;border-color:#FF6600;font-weight:900}
  </style>
</head>
<body>

<div id="splash-screen" class="screen active">
  <h1>WORKOUT<br />TRACKER</h1>
  <div class="splash-subtitle">MUSCLES BY RJ</div>
</div>

<div id="home-screen" class="screen">
  <div class="screen-header">
    <div class="screen-header-title">HOME</div>
  </div>
  <div class="screen-content">
    <div class="home-buttons">
      <button class="home-btn" onclick="startTodayWorkout()">WORKOUT</button>
      <button class="home-btn" onclick="goToMeasurements()">MEASUREMENTS</button>
      <button class="home-btn" onclick="goToCalculator()">1RM CALCULATOR</button>
      <button class="home-btn" onclick="goToCalendar()">CALENDAR</button>
      <button class="home-btn" onclick="goToDashboard()">PROGRESS</button>
    </div>
  </div>
</div>

<div id="routine-screen" class="screen">
  <div class="screen-header">
    <button class="header-btn" onclick="goHome()">←</button>
    <div id="routine-day-title" class="screen-header-title"></div>
    <button class="header-btn" onclick="toggleSwitchDay()" style="background:#FF9800">≡</button>
  </div>
  <div id="switch-day-menu" style="display:none;width:100%;background:#f5f5f5;padding:10px;text-align:center;position:absolute;top:60px;z-index:100">
    <div style="font-size:0.8rem;font-weight:600;text-transform:uppercase;margin-bottom:8px">Switch Day:</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="day-btn" onclick="switchDay('Monday')" style="padding:10px;font-size:0.9rem">Monday</button>
      <button class="day-btn" onclick="switchDay('Tuesday')" style="padding:10px;font-size:0.9rem">Tuesday</button>
      <button class="day-btn" onclick="switchDay('Wednesday')" style="padding:10px;font-size:0.9rem">Wednesday</button>
      <button class="day-btn" onclick="switchDay('Thursday')" style="padding:10px;font-size:0.9rem">Thursday</button>
      <button class="day-btn" onclick="switchDay('Friday')" style="padding:10px;font-size:0.9rem">Friday</button>
    </div>
  </div>
  <div class="screen-content">
    <div id="supersets-list" class="supersets-list"></div>
    <button class="complete-btn" onclick="completeWorkout()">COMPLETE</button>
  </div>
</div>

<div id="measurements-screen" class="screen">
  <div class="screen-header">
    <button class="header-btn" onclick="goHome()">←</button>
    <div class="screen-header-title">MEASUREMENTS</div>
    <div style="width:40px"></div>
  </div>
  <div class="screen-content">
    <div class="measurements-section">
      <div class="section-title">BUILD (Measures Muscle Growth)</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Right Bicep (in)</label>
          <input type="number" class="form-input" id="rb-bicep" placeholder="0.0" step="0.1">
        </div>
        <div class="form-group">
          <label class="form-label">Left Bicep (in)</label>
          <input type="number" class="form-input" id="lb-bicep" placeholder="0.0" step="0.1">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Right Forearm (in)</label>
          <input type="number" class="form-input" id="rf-forearm" placeholder="0.0" step="0.1">
        </div>
        <div class="form-group">
          <label class="form-label">Left Forearm (in)</label>
          <input type="number" class="form-input" id="lf-forearm" placeholder="0.0" step="0.1">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Right Thigh (in)</label>
          <input type="number" class="form-input" id="rt-thigh" placeholder="0.0" step="0.1">
        </div>
        <div class="form-group">
          <label class="form-label">Left Thigh (in)</label>
          <input type="number" class="form-input" id="lt-thigh" placeholder="0.0" step="0.1">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Chest (in)</label>
        <input type="number" class="form-input" id="chest" placeholder="0.0" step="0.1">
      </div>
    </div>

    <div class="measurements-section">
      <div class="section-title">CUT (Measures Fat Loss)</div>
      <div class="form-group">
        <label class="form-label">Weight (lbs)</label>
        <input type="number" class="form-input" id="weight" placeholder="0.0" step="0.1">
      </div>
      <div style="background:#1a1a1a;padding:10px;border-radius:8px;margin-top:8px">
        <div class="section-title" style="margin-bottom:10px;font-size:0.85rem">Fat Caliper (Optional)</div>
        <a class="youtube-link" href="https://www.youtube.com/watch?v=a1A9m0wO17g" target="_blank">How to Measure Fat</a>
        <div class="form-row" style="margin-top:10px">
          <div class="form-group">
            <label class="form-label">Chest (%)</label>
            <input type="number" class="form-input" id="fc-chest" placeholder="0.0" step="0.1">
          </div>
          <div class="form-group">
            <label class="form-label">Abdominal (%)</label>
            <input type="number" class="form-input" id="fc-abdomen" placeholder="0.0" step="0.1">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Thigh (%)</label>
          <input type="number" class="form-input" id="fc-thigh" placeholder="0.0" step="0.1">
        </div>
      </div>
      <button class="admin-btn" style="margin-top:15px" onclick="saveMeasurements()">SAVE</button>
    </div>
  </div>
</div>

<div id="calculator-screen" class="screen">
  <div class="screen-header">
    <button class="header-btn" onclick="goHome()">←</button>
    <div class="screen-header-title">1RM CALCULATOR</div>
    <div style="width:40px"></div>
  </div>
  <div class="screen-content">
    <div class="measurements-section">
      <div class="form-group">
        <label class="form-label">Exercise Name</label>
        <input type="text" class="form-input" id="orm-exercise" placeholder="e.g., Bench Press">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Weight (lbs)</label>
          <input type="number" class="form-input" id="orm-weight" placeholder="0" step="0.5">
        </div>
        <div class="form-group">
          <label class="form-label">Reps</label>
          <input type="number" class="form-input" id="orm-reps" placeholder="0" step="1" min="1" max="30">
        </div>
      </div>
      <button class="admin-btn" onclick="calculateORM()">CALCULATE</button>
      <div id="orm-result"></div>
    </div>
  </div>
</div>

<div id="calendar-screen" class="screen">
  <div class="screen-header">
    <button class="header-btn" onclick="goHome()">←</button>
    <div class="screen-header-title">CALENDAR</div>
    <div style="width:40px"></div>
  </div>
  <div class="screen-content">
    <div id="calendar-month" style="font-size:1rem;font-weight:700;margin:15px 0;text-align:center"></div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>
</div>

<div id="dashboard-screen" class="screen">
  <div class="screen-header">
    <button class="header-btn" onclick="goHome()">←</button>
    <div class="screen-header-title">PROGRESS</div>
    <div style="width:40px"></div>
  </div>
  <div class="screen-content">
    <div id="dashboard-content" style="width:100%;max-width:380px"></div>
  </div>
</div>

<div id="admin-screen" class="screen">
  <div class="screen-header">
    <div class="screen-header-title">ADMIN</div>
    <button class="header-btn" onclick="closeAdmin()">✕</button>
  </div>
  <div class="screen-content">
    <div style="width:100%;max-width:380px">
      <div class="admin-tabs">
        <button class="admin-tab-btn active" onclick="switchAdminTab('build')">Build</button>
        <button class="admin-tab-btn" onclick="switchAdminTab('manage')">Manage</button>
      </div>
      <div id="admin-build" class="admin-panel active">
        <div class="selector-group">
          <label>Select Day:</label>
          <select id="admin-day-select" onchange="loadDayForEdit()">
            <option value="">--Choose--</option>
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
          </select>
        </div>
        <div id="supersets-config-container"></div>
        <div class="admin-buttons">
          <button class="admin-btn" onclick="addNewSuperset()">+Add Superset</button>
          <button class="admin-btn" onclick="saveDayRoutine()">SAVE DAY</button>
        </div>
      </div>
      <div id="admin-manage" class="admin-panel">
        <button class="admin-btn" onclick="exportRoutines()">Export Routines</button>
        <button class="admin-btn" onclick="importRoutines()">Import Routines</button>
        <button class="admin-btn" onclick="clearAllData()">Clear All Data</button>
        <input type="file" id="import-file" style="display:none" accept=".json"/>
      </div>
    </div>
  </div>
</div>

<button class="admin-toggle" onclick="toggleAdmin()">⚙️</button>

<script>
let currentDay = '';

function getToday() {
  const d = new Date();
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  return days[d.getDay()];
}

function getRoutines() {
  return JSON.parse(localStorage.getItem('workout_routines') || '{}');
}

function saveRoutines(r) {
  localStorage.setItem('workout_routines', JSON.stringify(r));
}

function goHome() {
  showScreen('home-screen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startTodayWorkout() {
  const today = getToday();
  if (today === 'Sunday' || today === 'Saturday') {
    alert('No workout scheduled for ' + today);
    goHome();
    return;
  }
  openDay(today);
}

function openDay(day) {
  document.getElementById('routine-day-title').innerText = day.toUpperCase();
  currentDay = day;
  showScreen('routine-screen');
  renderRoutine(day);
}

function toggleSwitchDay() {
  const m = document.getElementById('switch-day-menu');
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}

function switchDay(day) {
  document.getElementById('switch-day-menu').style.display = 'none';
  openDay(day);
}

function renderRoutine(day) {
  const c = document.getElementById('supersets-list');
  c.innerHTML = '';
  const r = getRoutines();
  const dr = r[day];
  
  if (!dr || !dr.supersets || dr.supersets.length === 0) {
    c.innerHTML = '<div style="text-align:center;margin-top:30px;color:#666">No routine</div>';
    return;
  }

  dr.supersets.forEach((ss, si) => {
    const section = document.createElement('div');
    section.className = 'superset-section';
    
    let muscles = '';
    if (ss.exercises && ss.exercises.length > 0) {
      const muscleSet = new Set();
      ss.exercises.forEach(ex => {
        if (ex.name === 'Barbell Bench Press' || ex.name === 'Push-ups') muscleSet.add('Chest');
        if (ex.name.includes('Row') || ex.name.includes('Pull')) muscleSet.add('Back');
        if (ex.name.includes('Curl')) muscleSet.add('Biceps');
        if (ex.name.includes('Dip') || ex.name.includes('Crusher')) muscleSet.add('Triceps');
        if (ex.name.includes('Squat') || ex.name.includes('Deadlift') || ex.name.includes('Lunge')) muscleSet.add('Legs');
        if (ex.name.includes('Press') && !ex.name.includes('Bench')) muscleSet.add('Shoulders');
        if (ex.name.includes('Crunch') || ex.name.includes('Plank')) muscleSet.add('Abs');
      });
      muscles = Array.from(muscleSet).join(', ');
    }
    
    const title = document.createElement('div');
    title.className = 'superset-title-block';
    title.innerHTML = '<div class="superset-header">' + ss.title + '</div><div style="font-size:0.75rem;color:#999;text-transform:uppercase;margin-top:4px">' + muscles + '</div><div style="font-size:0.75rem;color:#aaa">' + ss.details + '</div>';
    section.appendChild(title);
    
    const rs = ss.restTime || 60;
    
    for (let i = 1; i <= ss.sets; i++) {
      const setBlock = document.createElement('div');
      setBlock.className = 'set-block';
      setBlock.innerHTML = '<div class="set-label">SET ' + i + '</div>';
      
      ss.exercises.forEach((ex) => {
        const row = document.createElement('div');
        row.className = 'exercise-row';
        row.innerHTML = '<img src="' + ex.url + '" class="exercise-thumb" onerror="this.src=\'https://via.placeholder.com/50/FF6600/FF6600\'"/><div class="exercise-name">' + ex.name + '</div><div class="exercise-inputs"><div style="display:flex;flex-direction:column"><span class="input-label">Lbs</span><input type="number" placeholder="0"></div><div style="display:flex;flex-direction:column"><span class="input-label">Reps</span><input type="number" placeholder="0"></div></div>';
        setBlock.appendChild(row);
      });
      
      const restBtn = document.createElement('button');
      restBtn.className = 'rest-btn';
      restBtn.innerText = 'REST ' + rs + 's';
      restBtn.onclick = function() { startRestTimer(this, rs); };
      setBlock.appendChild(restBtn);
      
      section.appendChild(setBlock);
    }
    
    c.appendChild(section);
  });
}

function startRestTimer(btn, seconds) {
  if (btn.dataset.running === 'true') return;
  btn.dataset.running = 'true';
  btn.classList.add('active-timer');
  
  let remaining = seconds;
  btn.innerText = 'RESTING: ' + remaining + 's';
  
  const timer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(timer);
      btn.innerText = 'REST COMPLETE';
      btn.classList.remove('active-timer');
      try {
        const a = new(window.AudioContext || window.webkitAudioContext)();
        const o = a.createOscillator();
        const g = a.createGain();
        o.connect(g);
        g.connect(a.destination);
        o.frequency.value = 800;
        g.gain.setValueAtTime(0.3, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, a.currentTime + 0.1);
        o.start(a.currentTime);
        o.stop(a.currentTime + 0.1);
      } catch(e) {}
    } else {
      btn.innerText = 'RESTING: ' + remaining + 's';
    }
  }, 1000);
}

function completeWorkout() {
  alert('Workout Complete!');
  const dt = new Date().toISOString().split('T')[0];
  const c = JSON.parse(localStorage.getItem('completed_workouts') || '{}');
  c[dt] = currentDay;
  localStorage.setItem('completed_workouts', JSON.stringify(c));
  goHome();
}

function goToMeasurements() {
  showScreen('measurements-screen');
}

function saveMeasurements() {
  alert('Saved!');
}

function goToCalculator() {
  showScreen('calculator-screen');
}

function calculateORM() {
  const w = parseFloat(document.getElementById('orm-weight').value);
  const r = parseInt(document.getElementById('orm-reps').value);
  if (!w || !r) {
    alert('Enter weight and reps');
    return;
  }
  const orm = w * (36 / (37 - r));
  document.getElementById('orm-result').innerHTML = '<div class="orm-result">1RM: ' + orm.toFixed(1) + ' lbs</div>';
}

function goToCalendar() {
  showScreen('calendar-screen');
  renderCalendar();
}

function renderCalendar() {
  const c = document.getElementById('calendar-grid');
  const m = document.getElementById('calendar-month');
  const cw = new Date();
  const today = cw.getDate();
  m.innerText = cw.toLocaleDateString('en-US', {month:'long', year:'numeric'});
  
  const fd = new Date(cw.getFullYear(), cw.getMonth(), 1).getDay();
  const ld = new Date(cw.getFullYear(), cw.getMonth()+1, 0).getDate();
  
  let h = '';
  const dns = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  dns.forEach(d => h += '<div class="calendar-day" style="font-weight:900;color:#666">' + d + '</div>');
  for (let i = 0; i < fd; i++) h += '<div class="calendar-day"></div>';
  for (let i = 1; i <= ld; i++) {
    const isToday = (i === today) ? ' today' : '';
    h += '<div class="calendar-day' + isToday + '">' + i + '</div>';
  }
  
  c.innerHTML = h;
}

function goToDashboard() {
  showScreen('dashboard-screen');
  const c = document.getElementById('dashboard-content');
  let h = '<div class="dashboard-stat"><div class="dashboard-stat-label">Total Volume</div><div class="dashboard-stat-value">0 lbs</div></div>';
  h += '<div class="dashboard-stat"><div class="dashboard-stat-label">Workouts</div><div class="dashboard-stat-value">0</div></div>';
  c.innerHTML = h;
}

function toggleAdmin() {
  const a = document.getElementById('admin-screen');
  if (a.classList.contains('active')) {
    closeAdmin();
  } else {
    a.classList.add('active');
  }
}

function closeAdmin() {
  document.getElementById('admin-screen').classList.remove('active');
}

function switchAdminTab(t) {
  document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('admin-' + t).classList.add('active');
}

function loadDayForEdit() {
  const d = document.getElementById('admin-day-select').value;
  if (!d) return;
  const r = getRoutines();
  const dr = r[d] || {supersets: []};
  
  let html = '';
  if (dr.supersets.length === 0) {
    html = '<p style="color:#666;text-align:center">No supersets</p>';
  } else {
    dr.supersets.forEach((ss, idx) => {
      html += '<div class="superset-config">';
      html += '<input type="text" class="config-input" placeholder="Title" value="' + ss.title + '">';
      html += '<input type="text" class="config-input" placeholder="Details" value="' + ss.details + '">';
      html += '<label style="color:#000;font-size:0.85rem;font-weight:600">Sets:</label>';
      html += '<input type="number" class="config-input" min="1" max="10" value="' + ss.sets + '">';
      html += '<label style="color:#000;font-size:0.85rem;font-weight:600;display:block;margin-top:8px">Rest (sec):</label>';
      html += '<select class="rest-selector"><option value="10">10s</option><option value="20">20s</option><option value="30">30s</option><option value="45">45s</option><option value="60" selected>60s</option><option value="75">75s</option><option value="90">90s</option><option value="120">120s</option></select>';
      html += '<label style="color:#000;font-size:0.85rem;font-weight:600;display:block;margin-top:10px">Muscle Group:</label>';
      html += '<select class="flow-dropdown" id="mg-' + idx + '" onchange="updateMuscleFlow(' + idx + ')"><option>--Choose--</option><option value="Chest">Chest</option><option value="Back">Back</option><option value="Biceps">Biceps</option><option value="Triceps">Triceps</option><option value="Legs">Legs</option><option value="Shoulders">Shoulders</option><option value="Abs">Abs</option></select>';
      html += '<label style="color:#000;font-size:0.85rem;font-weight:600;display:block;margin-top:8px">Equipment:</label>';
      html += '<select class="flow-dropdown" id="eq-' + idx + '" onchange="updateEquipmentFlow(' + idx + ')" style="display:none"><option>--Choose--</option></select>';
      html += '<label style="color:#000;font-size:0.85rem;font-weight:600;display:block;margin-top:8px">Exercise:</label>';
      html += '<select class="flow-dropdown" id="ex-' + idx + '" onchange="selectExerciseFlow(' + idx + ')" style="display:none"><option>--Choose--</option></select>';
      html += '<div id="selected-' + idx + '" style="margin-top:10px"></div>';
      html += '<button class="admin-btn" style="margin-top:10px" onclick="removeSuperset(' + idx + ')">Remove</button>';
      html += '</div>';
    });
  }
  
  document.getElementById('supersets-config-container').innerHTML = html;
}

function addNewSuperset() {
  const d = document.getElementById('admin-day-select').value;
  if (!d) {
    alert('Select day first');
    return;
  }
  const r = getRoutines();
  if (!r[d]) r[d] = {supersets: []};
  r[d].supersets.push({title: '', details: '', sets: 3, restTime: 60, exercises: []});
  saveRoutines(r);
  loadDayForEdit();
}

function removeSuperset(i) {
  const d = document.getElementById('admin-day-select').value;
  const r = getRoutines();
  r[d].supersets.splice(i, 1);
  saveRoutines(r);
  loadDayForEdit();
}

function updateMuscleFlow(idx) {
  const mg = document.getElementById('mg-' + idx).value;
  const eqSel = document.getElementById('eq-' + idx);
  const exSel = document.getElementById('ex-' + idx);
  if (mg !== '--Choose--') {
    eqSel.style.display = 'block';
    eqSel.innerHTML = '<option>--Choose--</option>';
    Object.keys(MUSCLES[mg]).forEach(eq => {
      eqSel.innerHTML += '<option value="' + eq + '">' + eq + '</option>';
    });
    exSel.style.display = 'none';
  }
}

function updateEquipmentFlow(idx) {
  const mg = document.getElementById('mg-' + idx).value;
  const eq = document.getElementById('eq-' + idx).value;
  const exSel = document.getElementById('ex-' + idx);
  if (eq !== '--Choose--') {
    exSel.style.display = 'block';
    exSel.innerHTML = '<option>--Choose--</option>';
    MUSCLES[mg][eq].forEach(ex => {
      exSel.innerHTML += '<option value="' + ex.name + '|' + ex.url + '">' + ex.name + '</option>';
    });
  }
}

function selectExerciseFlow(idx) {
  const exVal = document.getElementById('ex-' + idx).value;
  if (exVal === '--Choose--') return;
  const parts = exVal.split('|');
  const name = parts[0];
  const url = parts[1];
  const d = document.getElementById('admin-day-select').value;
  const r = getRoutines();
  const ss = r[d].supersets[idx];
  if (!ss.exercises.find(e => e.name === name)) {
    ss.exercises.push({name: name, url: url});
    saveRoutines(r);
    const selectedDiv = document.getElementById('selected-' + idx);
    const tag = document.createElement('div');
    tag.style.cssText = 'background:#FF6600;color:#000;padding:8px 12px;border-radius:8px;display:inline-block;margin-right:8px;font-size:0.8rem;font-weight:600';
    tag.innerHTML = name + ' <button style="background:none;border:none;color:#000;cursor:pointer;font-weight:bold;margin-left:8px" onclick="this.parentElement.remove()">✕</button>';
    selectedDiv.appendChild(tag);
  }
}

function saveDayRoutine() {
  alert('Saved!');
}

function exportRoutines() {
  const r = getRoutines();
  const s = JSON.stringify(r, null, 2);
  const b = new Blob([s], {type: 'application/json'});
  const u = URL.createObjectURL(b);
  const l = document.createElement('a');
  l.href = u;
  l.download = 'routines.json';
  l.click();
}

function importRoutines() {
  document.getElementById('import-file').click();
}

document.getElementById('import-file').addEventListener('change', (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = (evt) => {
    try {
      const imp = JSON.parse(evt.target.result);
      saveRoutines(imp);
      alert('Imported!');
      loadDayForEdit();
    } catch(err) {
      alert('Invalid JSON');
    }
  };
  r.readAsText(f);
});

function clearAllData() {
  if (confirm('Clear ALL data?')) {
    localStorage.removeItem('workout_routines');
    alert('Cleared!');
  }
}

setTimeout(() => {
  document.getElementById('splash-screen').classList.remove('active');
  document.getElementById('home-screen').classList.add('active');
}, 2500);
